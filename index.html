<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Has Karadeniz - Bilet Satış Sistemi</title>
    <style>
        :root {
            --primary: #004e92;
            --secondary: #000428;
            --accent: #f39c12;
            --success: #27ae60;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f4f7f6;
            margin: 0;
            padding: 20px;
        }

        .container { max-width: 900px; margin: 0 auto; }

        header {
            background: linear-gradient(to right, var(--secondary), var(--primary));
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 20px;
        }

        /* Arama Bölümü */
        .search-panel {
            background: white;
            padding: 20px;
            border-radius: 10px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        input, select, button {
            padding: 12px;
            border-radius: 5px;
            border: 1px solid #ddd;
        }

        button {
            background: var(--accent);
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }

        /* Seferler */
        .trip-list { margin-top: 20px; display: none; }
        .trip-card {
            background: white;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 6px solid var(--primary);
        }

        /* Otobüs Düzeni (2+1 Travego) */
        .bus-layout {
            background: white;
            padding: 20px;
            border-radius: 10px;
            display: none;
            margin-top: 20px;
            overflow-x: auto;
        }

        .seat-grid {
            display: grid;
            grid-template-columns: 40px 40px 40px 40px; /* 2+1 yerleşimi için boşluk dahil */
            gap: 10px;
            justify-content: center;
        }

        .seat {
            width: 35px;
            height: 35px;
            background: #eee;
            border: 1px solid #ccc;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            cursor: pointer;
        }

        .seat.selected { background: var(--success); color: white; }
        .seat.sold { background: #e74c3c; color: white; cursor: not-allowed; }
        .aisle { width: 30px; }

        /* Bilet Çıktısı */
        #ticket-result {
            display: none;
            background: white;
            padding: 30px;
            border: 2px dashed #333;
            margin-top: 20px;
            position: relative;
        }

        .ticket-header { border-bottom: 2px solid var(--primary); padding-bottom: 10px; margin-bottom: 20px; }

        @media print {
            body * { visibility: hidden; }
            #ticket-result, #ticket-result * { visibility: visible; }
            #ticket-result { position: absolute; left: 0; top: 0; width: 100%; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>HAS KARADENİZ</h1>
        <p>Konforun Tek Adresi</p>
    </header>

    <div class="search-panel">
        <select id="from">
            <option value="İstanbul">İstanbul</option>
            <option value="Rize">Rize</option>
            <option value="Trabzon">Trabzon</option>
            <option value="Ankara">Ankara</option>
        </select>
        <select id="to">
            <option value="Trabzon">Trabzon</option>
            <option value="İstanbul">İstanbul</option>
            <option value="Artvin">Artvin</option>
        </select>
        <input type="date" value="2026-04-10">
        <button onclick="findTrips()">Sefer Bul</button>
    </div>

    <div id="trip-list" class="trip-list">
        </div>

    <div id="bus-selection" class="bus-layout">
        <h3 style="text-align:center">Travego 2+1 - Koltuk Seçimi</h3>
        <div id="seats-container" class="seat-grid"></div>
        
        <div id="passenger-info" style="margin-top:20px; text-align:center; display:none;">
            <input type="text" id="pName" placeholder="Ad Soyad Giriniz">
            <button onclick="buyTicket()" style="background:var(--success)">SATIN AL VE BİLETİ ÇIKAR</button>
        </div>
    </div>

    <div id="ticket-result">
        <div class="ticket-header">
            <h2>HAS KARADENİZ SEYAHAT BİLETİ</h2>
            <p id="tNo">Bilet No: #HK88231</p>
        </div>
        <p><strong>Yolcu Adı:</strong> <span id="resName"></span></p>
        <p><strong>Güzergah:</strong> <span id="resRoute"></span></p>
        <p><strong>Kalkış Saati:</strong> <span id="resTime"></span></p>
        <p><strong>Sefer Süresi:</strong> <span id="resDuration"></span></p>
        <p><strong>Koltuk No:</strong> <span id="resSeat"></span></p>
        <p><strong>Araç Tipi:</strong> Travego 2+1 VIP</p>
        <hr>
        <button onclick="window.print()">Yazdır</button>
        <button onclick="location.reload()" style="background:#7f8c8d">Yeni Arama</button>
    </div>
</div>

<script>
    let selectedSeat = null;
    let selectedTripData = {};

    function findTrips() {
        const tripList = document.getElementById('trip-list');
        tripList.style.display = 'block';
        tripList.innerHTML = '';
        
        const hours = ["09:00", "13:30", "18:00", "21:00", "23:55"];
        const duration = "14 Saat";

        hours.forEach((time, index) => {
            tripList.innerHTML += `
                <div class="trip-card">
                    <div>
                        <strong>Has Karadeniz</strong><br>
                        <small>Travego 2+1 Rahat</small>
                    </div>
                    <div>${time}<br><small>${duration}</small></div>
                    <div>750 TL</div>
                    <button onclick="showBus('${time}', '${duration}')">Seç</button>
                </div>
            `;
        });
    }

    function showBus(time, duration) {
        selectedTripData = {
            time: time,
            duration: duration,
            from: document.getElementById('from').value,
            to: document.getElementById('to').value
        };
        
        const busSelection = document.getElementById('bus-selection');
        busSelection.style.display = 'block';
        const container = document.getElementById('seats-container');
        container.innerHTML = '';

        // 41 Koltuklu 2+1 Düzeni Oluşturma
        for (let i = 1; i <= 41; i++) {
            const seat = document.createElement('div');
            seat.className = 'seat';
            seat.innerText = i;
            
            // Rastgele dolu koltuklar
            if(Math.random() < 0.2) seat.classList.add('sold');

            seat.onclick = function() {
                if(!this.classList.contains('sold')) {
                    document.querySelectorAll('.seat').forEach(s => s.classList.remove('selected'));
                    this.classList.add('selected');
                    selectedSeat = i;
                    document.getElementById('passenger-info').style.display = 'block';
                }
            };

            container.appendChild(seat);
            // 2+1 Koridor Boşluğu
            if (i % 3 === 1) {
                const aisle = document.createElement('div');
                aisle.className = 'aisle';
                container.appendChild(aisle);
            }
        }
        busSelection.scrollIntoView();
    }

    function buyTicket() {
        const name = document.getElementById('pName').value;
        if(!name) return alert("Lütfen adınızı girin!");

        document.getElementById('bus-selection').style.display = 'none';
        document.getElementById('trip-list').style.display = 'none';
        document.querySelector('.search-panel').style.display = 'none';

        document.getElementById('ticket-result').style.display = 'block';
        document.getElementById('resName').innerText = name;
        document.getElementById('resRoute').innerText = selectedTripData.from + " > " + selectedTripData.to;
        document.getElementById('resTime').innerText = selectedTripData.time;
        document.getElementById('resDuration').innerText = selectedTripData.duration;
        document.getElementById('resSeat').innerText = selectedSeat;
    }
</script>

</body>
</html>
