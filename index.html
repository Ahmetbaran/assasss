<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Has Karadeniz - Profesyonel Bilet Sistemi</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #004e92;
            --secondary: #000428;
            --accent: #f39c12;
            --success: #27ae60;
            --text: #333;
            --panel-bg: rgba(255, 255, 255, 0.95);
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)), 
                        url('https://images.pexels.com/photos/18413158/pexels-photo-18413158.jpeg') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            color: var(--text);
        }

        .container { max-width: 900px; margin: 0 auto; }

        header {
            background: linear-gradient(to right, rgba(0, 4, 40, 0.9), rgba(0, 78, 146, 0.9));
            color: white; padding: 25px; border-radius: 15px; text-align: center; margin-bottom: 20px;
        }

        .search-panel {
            background: var(--panel-bg); padding: 20px; border-radius: 15px;
            display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        input, select, button { padding: 12px; border-radius: 8px; border: 1px solid #ddd; }
        button { background: var(--accent); color: white; border: none; cursor: pointer; font-weight: bold; }

        .trip-list { margin-top: 25px; display: none; }
        .trip-card {
            background: var(--panel-bg); padding: 20px; margin-bottom: 10px; border-radius: 12px;
            display: flex; justify-content: space-between; align-items: center;
            border-left: 8px solid var(--primary);
        }

        /* Otobüs Düzeni */
        .bus-layout { background: var(--panel-bg); padding: 25px; border-radius: 15px; display: none; margin-top: 20px; }
        .seat-grid { display: grid; grid-template-columns: 45px 45px 45px 45px; gap: 12px; justify-content: center; }
        .seat {
            width: 40px; height: 40px; background: #eee; border: 1px solid #ccc;
            border-radius: 6px; display: flex; align-items: center; justify-content: center;
            font-size: 12px; cursor: pointer; font-weight: bold;
        }
        .seat.selected { background: var(--success); color: white; }
        .seat.sold { background: #e74c3c; color: white; cursor: not-allowed; opacity: 0.6; }
        .aisle { width: 30px; }

        /* Bilet Çıktısı */
        #ticket-result { display: none; background: white; padding: 40px; border: 3px double #333; margin-top: 20px; border-radius: 10px; color: black; }
        
        /* Modal / Uyarı */
        .modal {
            display: none; position: fixed; z-index: 1000; left: 0; top: 0;
            width: 100%; height: 100%; background: rgba(0,0,0,0.8);
        }
        .modal-content {
            background: white; margin: 15% auto; padding: 25px; border-radius: 15px;
            width: 80%; max-width: 400px; text-align: center;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>HAS KARADENİZ SEYAHAT</h1>
        <p>Konforun ve Güvenin Adresi</p>
    </header>

    <div class="search-panel">
        <select id="from"><option value="Trabzon">Trabzon</option></select>
        <select id="to"><option value="Iğdır">Iğdır</option><option value="İstanbul">İstanbul</option></select>
        <input type="date" value="2026-04-10">
        <button onclick="findTrips()">SEFER ARA</button>
    </div>

    <div id="trip-list" class="trip-list"></div>

    <div id="seatModal" class="modal">
        <div class="modal-content">
            <h3 style="color:var(--accent)"><i class="fas fa-exclamation-circle"></i> Tekli Koltuk Seçimi</h3>
            <p>Tekli koltuklarda <b>50 TL</b> ekstra ücret uygulanmaktadır.</p>
            <button onclick="closeSeatModal()" style="width:100%">TAMAM</button>
        </div>
    </div>

    <div id="bus-selection" class="bus-layout">
        <h3 style="text-align:center">Travego 2+1 VIP Koltuk Seçimi</h3>
        <div id="seats-container" class="seat-grid"></div>
        <div id="passenger-info" style="margin-top:25px; text-align:center; display:none;">
            <p id="price-preview" style="font-weight:bold; color:var(--primary)"></p>
            <input type="text" id="pName" placeholder="Ad Soyad">
            <button onclick="buyTicket()" style="background:var(--success)">BİLETİ AL</button>
        </div>
    </div>

    <div id="ticket-result">
        <div style="text-align:center; border-bottom:2px solid #004e92">
            <h2>HAS KARADENİZ YOLCU BİLETİ</h2>
        </div>
        <p><strong>Yolcu:</strong> <span id="resName"></span></p>
        <p><strong>Güzergah:</strong> <span id="resRoute"></span></p>
        <p><strong>Koltuk No:</strong> <span id="resSeat"></span></p>
        <p><strong>Toplam Ücret:</strong> <span id="resPrice"></span></p>
        <div style="text-align:center; margin-top:20px;">
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=80x80&data=HasKaradenizBilet" alt="QR">
            <br><br>
            <button onclick="window.print()">YAZDIR</button>
            <button onclick="location.reload()" style="background:#7f8c8d">KAPAT</button>
        </div>
    </div>
</div>

<script>
    let selectedSeat = null;
    let selectedTripData = {};
    let basePrice = 900;
    let finalPrice = 900;

    function findTrips() {
        const tripList = document.getElementById('trip-list');
        tripList.style.display = 'block';
        tripList.innerHTML = '<h3 style="color:white">Seferler</h3>';
        ["09:00", "15:00", "22:00"].forEach(time => {
            tripList.innerHTML += `
                <div class="trip-card">
                    <div><strong>Has Karadeniz</strong><br><small>Travego 2+1</small></div>
                    <div><b>${time}</b></div>
                    <div style="color:var(--primary); font-weight:bold">${basePrice} TL</div>
                    <button onclick="showBus('${time}')">Seç</button>
                </div>`;
        });
    }

    function showBus(time) {
        selectedTripData = { time: time, from: "Trabzon", to: document.getElementById('to').value };
        document.getElementById('bus-selection').style.display = 'block';
        const container = document.getElementById('seats-container');
        container.innerHTML = '';

        for (let i = 1; i <= 41; i++) {
            const seat = document.createElement('div');
            seat.className = 'seat';
            seat.innerText = i;
            if(Math.random() < 0.1) seat.classList.add('sold');

            seat.onclick = function() {
                if(this.classList.contains('sold')) return;
                
                document.querySelectorAll('.seat').forEach(s => s.classList.remove('selected'));
                this.classList.add('selected');
                selectedSeat = i;
                
                // Tekli koltuk mantığı (1, 4, 7... yani i % 3 === 1)
                if(i % 3 === 1) {
                    finalPrice = basePrice + 50;
                    document.getElementById('seatModal').style.display = "block";
                } else {
                    finalPrice = basePrice;
                }
                
                document.getElementById('price-preview').innerText = "Toplam Ücret: " + finalPrice + " TL";
                document.getElementById('passenger-info').style.display = 'block';
            };

            container.appendChild(seat);
            if (i % 3 === 1) container.appendChild(document.createElement('div')).className = 'aisle';
        }
        document.getElementById('bus-selection').scrollIntoView();
    }

    function closeSeatModal() {
        document.getElementById('seatModal').style.display = "none";
    }

    function buyTicket() {
        const name = document.getElementById('pName').value;
        if(!name) return alert("İsim giriniz!");
        
        document.getElementById('bus-selection').style.display = 'none';
        document.getElementById('trip-list').style.display = 'none';
        document.querySelector('.search-panel').style.display = 'none';
        document.getElementById('ticket-result').style.display = 'block';
        
        document.getElementById('resName').innerText = name.toUpperCase();
        document.getElementById('resRoute').innerText = "Trabzon → " + selectedTripData.to;
        document.getElementById('resSeat').innerText = selectedSeat;
        document.getElementById('resPrice').innerText = finalPrice + " TL";
    }
</script>
</body>
</html>
