<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Has Karadeniz | Modern</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<style>
body {
    font-family: 'Poppins', sans-serif;
    margin: 0;
    padding: 0;
    background: linear-gradient(to bottom,#0a3d62,#1e3799);
    color: white;
}
header {
    text-align: center;
    padding: 30px 20px;
    font-size: 2rem;
    font-weight: 600;
}
.container {
    max-width: 1200px;
    margin: auto;
    padding: 20px;
}
select, input, button {
    padding: 12px;
    margin: 5px;
    border-radius: 8px;
    border: none;
    font-size: 1rem;
}
button {
    background: #00a8ff;
    color: white;
    cursor: pointer;
    transition: 0.3s;
}
button:hover {background: #0097e6;}
.sefer-card {
    background: rgba(39, 60, 117,0.8);
    padding: 15px;
    border-radius: 12px;
    margin: 15px 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    transition: 0.3s;
}
.sefer-card:hover {transform: scale(1.02);}
.koltuklar {
    display: grid;
    grid-template-columns: repeat(5, 50px);
    gap: 10px;
    justify-content: center;
    margin-top: 15px;
}
.koltuk-btn {
    padding: 12px;
    border-radius: 6px;
    cursor: pointer;
    text-align: center;
    font-weight: 600;
    transition: 0.3s;
}
.koltuk-btn:hover {transform: scale(1.1);}
.dolu {background: red; color:white; cursor:not-allowed;}
.secili {background: green !important; color:white;}
input, select {width: 150px;}
#formAlani {margin-top: 15px; text-align:center;}
#bilet {margin-top: 25px; text-align:center;}
@media(max-width:768px){
    .koltuklar {grid-template-columns: repeat(4, 50px);}
    .sefer-card {flex-direction: column; gap: 10px;}
}
</style>
</head>
<body>

<header>🚌 HAS KARADENİZ - Modern</header>

<div class="container">
    <select id="from"></select>
    <select id="to"></select>
    <button onclick="seferleriGoster()">Seferleri Göster</button>

    <div id="seferler"></div>
    <div id="koltukAlani"></div>
    <div id="formAlani"></div>
    <div id="bilet"></div>
</div>

<script>
const from = document.getElementById("from");
const to = document.getElementById("to");
const seferler = document.getElementById("seferler");
const koltukAlani = document.getElementById("koltukAlani");
const formAlani = document.getElementById("formAlani");
const bilet = document.getElementById("bilet");

const iller = ["Adana","Ankara","İstanbul","İzmir","Erzurum","Trabzon","Bursa","Antalya","Samsun","Van"];
iller.forEach(il => {
    from.innerHTML += `<option>${il}</option>`;
    to.innerHTML += `<option>${il}</option>`;
});

let doluKoltuklar = {0:[1,5,10],1:[3,7],2:[2,8,15],3:[6,9]};
let secilenSefer=null;
let secilenKoltuk=null;

function seferleriGoster(){
    const saatler = ["08:00","12:00","16:00","20:00"];
    const fiyatlar = [200,250,300,350];
    let html="";
    saatler.forEach((saat,i)=>{
        html+=`<div class="sefer-card">
            <span>${from.value} → ${to.value} | ${saat} | ${fiyatlar[i]} TL</span>
            <button onclick="koltukSec(${i})">Seç</button>
        </div>`;
    });
    seferler.innerHTML = html;
    koltukAlani.innerHTML = "";
    formAlani.innerHTML = "";
    bilet.innerHTML = "";
}

function koltukSec(i){
    secilenSefer=i;
    let html="<div class='koltuklar'>";
    for(let k=1;k<=41;k++){
        const dolu=doluKoltuklar[i].includes(k);
        html+=`<div class="koltuk-btn ${dolu?'dolu':''}" id="koltuk${k}">${k}</div>`;
    }
    html+="</div>";
    koltukAlani.innerHTML=html;
    for(let k=1;k<=41;k++){
        const btn=document.getElementById(`koltuk${k}`);
        if(!btn.classList.contains("dolu")){
            btn.addEventListener("click",()=>koltukTikla(btn,k));
        }
    }
    formAlani.innerHTML=`<select id="cinsiyet"><option>Erkek</option><option>Kadın</option></select>
    <input id="isim" placeholder="İsim">
    <input id="soyisim" placeholder="Soyisim">
    <button onclick="odeme()">Ödeme Yap</button>`;
}

function koltukTikla(el,no){
    document.querySelectorAll(".koltuk-btn").forEach(k=>k.classList.remove("secili"));
    el.classList.add("secili");
    secilenKoltuk=no;
}

function odeme(){
    const isimInput=document.getElementById("isim");
    const soyisimInput=document.getElementById("soyisim");
    const cinsiyetInput=document.getElementById("cinsiyet");
    if(!secilenKoltuk){alert("Lütfen koltuk seçin!");return;}
    doluKoltuklar[secilenSefer].push(secilenKoltuk);
    bilet.innerHTML=`<h2>Biletiniz</h2>
        <div style="background:rgba(0,0,0,0.4);padding:15px;border-radius:10px;">
        ${from.value} → ${to.value}<br>
        Koltuk: ${secilenKoltuk}<br>
        ${isimInput.value} ${soyisimInput.value}<br>
        ${cinsiyetInput.value}
        </div>`;
    koltukAlani.innerHTML="";
    formAlani.innerHTML="";
}
</script>

</body>
</html>
